services:
  # Tier 1: The Prizmatic Engine (Rust Core Core & Port Knock Ingress)
  prizmatic-engine:
    build:
      context: ./prizmatic-core
      dockerfile: Dockerfile
    container_name: prizmatic_core_engine
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    environment:
      - NODE_ROLE=NODE_B_ORIGIN
      - GIT_COMMITTER_EMAIL=ash@chromalon.biz
    tmpfs:
      - /run/entropy:size=128M
    volumes:
      - mnt_volatile_workspace:/workspace
    networks:
      - prizmatic_lab_mesh

  # Tier 2: The Dev Console Node (Equipped with Text-Based Browser)
  dev-console:
    image: alpine:latest
    container_name: prizmatic_dev_console
    restart: unless-stopped
    tty: true
    stdin_open: true
    depends_on:
      - prizmatic-engine
    environment:
      - GIT_AUTHOR_NAME="Captain Phoenix Ash"
      - GIT_AUTHOR_EMAIL=ash@chromalon.biz
    volumes:
      - mnt_volatile_workspace:/workspace
    # Adding 'lynx' directly alongside tmux and your core compiler utilities
    command: >
      sh -c "apk add --no-cache git tmux curl gcc cargo rust netcat-openbsd bmon lynx bash zsh mc vim nano make &&
             git config --global user.name 'Captain Phoenix Ash' &&
             git config --global user.email 'ash@chromalon.biz' &&
             echo 'Welcome to the Bridge. Prizmatic Protocol Lab with Text-Browser Active.' &&
             echo 'syntax on\nset tabstop=4\nset expandtab\nset shiftwidth=4\nset autoindent\nset number' > /root/.vimrc &&
             tail -f /dev/null"
    networks:
      - prizmatic_lab_mesh

volumes:
  mnt_volatile_workspace:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=3G,mode=777"

networks:
  prizmatic_lab_mesh:
    name: prizmatic_isolated_network
    driver: bridge
